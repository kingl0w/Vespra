name: vespra

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keymaster:
    build: ./keymaster
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"
    environment:
      # required
      VESPRA_MASTER_PASSWORD: ${VESPRA_MASTER_PASSWORD}
      VESPRA_KM_AUTH_TOKEN: ${VESPRA_KM_AUTH_TOKEN}
      # rpc urls (keymaster's convention: VESPRA_RPC_<CHAIN>)
      VESPRA_RPC_BASE: ${RPC_URL_BASE:-}
      VESPRA_RPC_BASE_SEPOLIA: ${RPC_URL_BASE_SEPOLIA:-}
      VESPRA_RPC_ARBITRUM: ${RPC_URL_ARBITRUM:-}
      VESPRA_RPC_ARBITRUM_SEPOLIA: ${RPC_URL_ARBITRUM_SEPOLIA:-}
      VESPRA_RPC_ETHEREUM: ${RPC_URL_ETHEREUM:-}
      VESPRA_RPC_OPTIMISM: ${RPC_URL_OPTIMISM:-}
      # optional safe addresses (sweep targets)
      VESPRA_SAFE_BASE: ${GNOSIS_SAFE_ADDRESS:-}
      VESPRA_SAFE_BASE_SEPOLIA: ${GNOSIS_SAFE_ADDRESS:-}
    volumes:
      - keymaster_data:/data
    depends_on:
      redis:
        condition: service_healthy

  nullboiler:
    build: ./nullboiler
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - nullboiler_data:/data
    depends_on:
      redis:
        condition: service_healthy

  gateway:
    build: ./gateway-rs
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"
    environment:
      # core
      VESPRA_HOST: 0.0.0.0
      VESPRA_PORT: 9001
      VESPRA_REDIS_URL: redis://redis:6379
      VESPRA_KEYMASTER_URL: http://keymaster:9100
      VESPRA_KEYMASTER_TOKEN: ${VESPRA_KM_AUTH_TOKEN}
      VESPRA_NULLBOILER_URL: http://nullboiler:9090
      # llm
      VESPRA_LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      VESPRA_LLM_API_KEY: ${LLM_API_KEY}
      VESPRA_LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      VESPRA_LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      # chains
      VESPRA_CHAINS: '["base","arbitrum","base_sepolia"]'
      # rpc urls (gateway's convention: RPC_URL_<CHAIN>)
      RPC_URL_BASE: ${RPC_URL_BASE:-}
      RPC_URL_BASE_SEPOLIA: ${RPC_URL_BASE_SEPOLIA:-}
      RPC_URL_ARBITRUM: ${RPC_URL_ARBITRUM:-}
      RPC_URL_ARBITRUM_SEPOLIA: ${RPC_URL_ARBITRUM_SEPOLIA:-}
      RPC_URL_ETHEREUM: ${RPC_URL_ETHEREUM:-}
      RPC_URL_OPTIMISM: ${RPC_URL_OPTIMISM:-}
      # dex routing — set one or the other
      VESPRA_ONEINCH_API_KEY: ${ONEINCH_API_KEY:-}
      VESPRA_PARASWAP_MODE: ${PARASWAP_MODE:-true}
      # price oracle
      VESPRA_PRICE_ORACLE: ${VESPRA_PRICE_ORACLE:-defillama}
      VESPRA_PRICE_ORACLE_FALLBACK: ${VESPRA_PRICE_ORACLE_FALLBACK:-coingecko}
      # treasury / fees
      VESPRA_TREASURY_ADDRESS: ${GNOSIS_SAFE_ADDRESS:-}
      FEE_RATE_BPS: ${FEE_RATE_BPS:-500}
      # execution mode — false = dry run, no real broadcasts
      VESPRA_AUTO_EXECUTE_ENABLED: ${VESPRA_AUTO_EXECUTE_ENABLED:-false}
      # logging
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      redis:
        condition: service_healthy
      keymaster:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:9200:9200"
    depends_on:
      - gateway

volumes:
  redis_data:
  keymaster_data:
  nullboiler_data:
