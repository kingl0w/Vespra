name: vespra

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keymaster:
    build: ./keymaster
    env_file: .env
    restart: unless-stopped
    environment:
      # keymaster reads the app-internal names; .env carries nicer aliases.
      VESPRA_MASTER_PASSWORD: ${KEYMASTER_MASTER_PASSWORD}
      VESPRA_KM_AUTH_TOKEN: ${KEYMASTER_BEARER_TOKEN}
      VESPRA_KM_HOST: 0.0.0.0
      VESPRA_KM_PORT: 9100
      VESPRA_KM_DB: /opt/vespra-keymaster/keymaster.db
      VESPRA_KM_KILL_SWITCH_STATE: /opt/vespra-keymaster/kill-switch.state
      # keymaster's rpc convention mirrors the gateway's RPC_URL_* keys.
      VESPRA_RPC_BASE: ${RPC_URL_BASE:-}
      VESPRA_RPC_BASE_SEPOLIA: ${RPC_URL_BASE_SEPOLIA:-}
      VESPRA_RPC_ARBITRUM: ${RPC_URL_ARBITRUM:-}
      VESPRA_RPC_ARBITRUM_SEPOLIA: ${RPC_URL_ARBITRUM_SEPOLIA:-}
      FEES_ENABLED: ${FEES_ENABLED:-false}
      TREASURY_ADDRESS: ${TREASURY_ADDRESS:-}
    volumes:
      - keymaster-data:/opt/vespra-keymaster
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  gateway:
    build: ./gateway-rs
    env_file: .env
    restart: unless-stopped
    environment:
      VESPRA_HOST: 0.0.0.0
      VESPRA_PORT: 9001
      VESPRA_KEYMASTER_TOKEN: ${KEYMASTER_BEARER_TOKEN}
      VESPRA_LLM_PROVIDER: anthropic
      VESPRA_LLM_API_KEY: ${ANTHROPIC_API_KEY}
      VESPRA_LLM_BASE_URL: https://api.anthropic.com
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      keymaster:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  redis-data:
  keymaster-data:
