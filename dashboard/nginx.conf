server {
    listen 9200;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the gateway. NO trailing slash on proxy_pass — the
    # gateway serves these routes under /api (and /api/health), so the prefix
    # must be preserved, not stripped.
    #
    # The browser stays token-less; nginx injects the gateway bearer token here
    # (this hop is loopback / behind Cloudflare Access). ${GATEWAY_TOKEN} is
    # substituted from the environment at container start by the nginx template
    # mechanism; nginx's own $vars below are left untouched. Empty token = the
    # header is harmless and the gateway runs open (default).
    location /api/ {
        proxy_pass http://gateway:9001;
        proxy_set_header Authorization "Bearer ${GATEWAY_TOKEN}";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets aggressively; HTML never
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
